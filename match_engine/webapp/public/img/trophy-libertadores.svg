<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 116">
  <defs>
    <linearGradient id="lb-cup" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a87000"/>
      <stop offset="30%"  stop-color="#f8d830"/>
      <stop offset="55%"  stop-color="#fae84a"/>
      <stop offset="100%" stop-color="#906000"/>
    </linearGradient>
    <linearGradient id="lb-hdl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7a5000"/>
      <stop offset="50%"  stop-color="#f0c820"/>
      <stop offset="100%" stop-color="#7a5000"/>
    </linearGradient>
    <linearGradient id="lb-neck" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#906800"/>
      <stop offset="50%"  stop-color="#f0d040"/>
      <stop offset="100%" stop-color="#906800"/>
    </linearGradient>
    <linearGradient id="lb-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#282830"/>
      <stop offset="100%" stop-color="#101016"/>
    </linearGradient>
    <linearGradient id="lb-base2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1e1e28"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="lb-rim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#806000"/>
      <stop offset="50%"  stop-color="#f0c820"/>
      <stop offset="100%" stop-color="#806000"/>
    </linearGradient>
  </defs>

  <!-- Cup bowl — wide sphere, distinctive Libertadores shape -->
  <ellipse cx="40" cy="36" rx="24" ry="30" fill="url(#lb-cup)"/>

  <!-- Inner shine -->
  <path d="M26,12 Q20,18 18,34 Q18,48 22,56"
        fill="none" stroke="rgba(255,248,160,0.6)" stroke-width="4" stroke-linecap="round"/>
  <path d="M56,12 Q62,18 64,34 Q64,48 60,56"
        fill="none" stroke="rgba(140,90,0,0.2)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Equator band -->
  <path d="M16,36 Q40,41 64,36" fill="none" stroke="rgba(180,120,0,0.4)" stroke-width="1.8"/>
  <!-- Upper decorative line -->
  <path d="M20,20 Q40,25 60,20" fill="none" stroke="rgba(255,240,120,0.35)" stroke-width="1.2"/>

  <!-- Gold rim at top of cup -->
  <path d="M22,9 Q40,5 58,9" fill="none" stroke="url(#lb-rim)" stroke-width="4" stroke-linecap="round"/>

  <!-- Left handle — wide sweeping arcs (very distinctive Libertadores) -->
  <path d="M17,18 Q0,12 0,34 Q0,56 14,60 Q18,60.5 21,57"
        fill="none" stroke="url(#lb-hdl)" stroke-width="7.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M16,20 Q2,14 2,34 Q2,54 14,58"
        fill="none" stroke="rgba(255,245,150,0.35)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right handle -->
  <path d="M63,18 Q80,12 80,34 Q80,56 66,60 Q62,60.5 59,57"
        fill="none" stroke="url(#lb-hdl)" stroke-width="7.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M64,20 Q78,14 78,34 Q78,54 66,58"
        fill="none" stroke="rgba(255,245,150,0.35)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Narrow neck -->
  <path d="M34,66 Q40,69 46,66 L44,80 Q40,82 36,80 Z" fill="url(#lb-neck)"/>
  <rect x="37" y="67" width="4" height="13" rx="1.5" fill="rgba(255,245,140,0.25)"/>

  <!-- Base step 1 — gold accent -->
  <rect x="26" y="80" width="28" height="5" rx="2" fill="url(#lb-rim)"/>

  <!-- Base step 2 — dark marble -->
  <rect x="20" y="85" width="40" height="8" rx="2" fill="url(#lb-base)"/>
  <!-- marble highlight -->
  <rect x="22" y="87" width="38" height="1.5" rx="1" fill="rgba(255,255,255,0.06)"/>

  <!-- Base step 3 (widest, darkest) -->
  <rect x="12" y="93" width="56" height="14" rx="3" fill="url(#lb-base2)"/>
  <!-- Gold band on base -->
  <rect x="12" y="93" width="56" height="2.5" rx="1" fill="rgba(210,160,0,0.45)"/>
  <rect x="12" y="104.5" width="56" height="2.5" rx="1" fill="rgba(210,160,0,0.3)"/>
  <!-- marble veins hint -->
  <line x1="25" y1="97" x2="32" y2="104" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="50" y1="95" x2="44" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
</svg>
