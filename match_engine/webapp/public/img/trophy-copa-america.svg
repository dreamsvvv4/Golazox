<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 116">
  <defs>
    <linearGradient id="ca-cup" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#b87808"/>
      <stop offset="35%"  stop-color="#fae060"/>
      <stop offset="60%"  stop-color="#f0c030"/>
      <stop offset="100%" stop-color="#a06808"/>
    </linearGradient>
    <linearGradient id="ca-hdl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#906000"/>
      <stop offset="50%"  stop-color="#f8d840"/>
      <stop offset="100%" stop-color="#906000"/>
    </linearGradient>
    <linearGradient id="ca-stem" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a07010"/>
      <stop offset="50%"  stop-color="#f0d050"/>
      <stop offset="100%" stop-color="#a07010"/>
    </linearGradient>
    <linearGradient id="ca-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#3a2800"/>
      <stop offset="100%" stop-color="#1a1000"/>
    </linearGradient>
    <linearGradient id="ca-basemid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#4a3400"/>
      <stop offset="100%" stop-color="#2a1c00"/>
    </linearGradient>
  </defs>

  <!-- Cup bowl — slightly wider, rounder than Euro -->
  <path d="M24,6 Q16,8 15,24 Q13,44 17,57 Q24,70 40,74 Q56,70 63,57 Q67,44 65,24 Q64,8 56,6 Z"
        fill="url(#ca-cup)"/>

  <!-- Inner shine left -->
  <path d="M28,10 Q22,14 20,30 Q18,46 22,58"
        fill="none" stroke="rgba(255,248,180,0.65)" stroke-width="4" stroke-linecap="round"/>
  <!-- Inner shadow right -->
  <path d="M54,10 Q60,14 62,30 Q64,46 60,58"
        fill="none" stroke="rgba(140,90,0,0.25)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Decorative rim band -->
  <path d="M15,26 Q40,31 65,26" fill="none" stroke="rgba(255,240,120,0.5)" stroke-width="1.5"/>

  <!-- Horizontal band mid-cup -->
  <path d="M16,46 Q40,51 64,46" fill="none" stroke="rgba(180,120,0,0.35)" stroke-width="1.2"/>

  <!-- Left handle — wide curve -->
  <path d="M15,22 Q-2,28 -2,47 Q-2,63 13,61 Q17,60.5 19,57"
        fill="none" stroke="url(#ca-hdl)" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M14,24 Q0,30 0,47 Q0,60 12,59"
        fill="none" stroke="rgba(255,245,160,0.4)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right handle — wide curve -->
  <path d="M65,22 Q82,28 82,47 Q82,63 67,61 Q63,60.5 61,57"
        fill="none" stroke="url(#ca-hdl)" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M66,24 Q80,30 80,47 Q80,60 68,59"
        fill="none" stroke="rgba(255,245,160,0.4)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Stem -->
  <rect x="34" y="74" width="12" height="16" rx="3" fill="url(#ca-stem)"/>
  <rect x="36" y="75" width="4.5" height="14" rx="2" fill="rgba(255,248,160,0.28)"/>

  <!-- Base step 1 -->
  <rect x="24" y="90" width="32" height="7" rx="2" fill="url(#ca-basemid)"/>
  <!-- Gold accent line -->
  <rect x="24" y="90" width="32" height="1.5" rx="1" fill="rgba(220,170,0,0.5)"/>
  <!-- Base step 2 (widest) -->
  <rect x="14" y="97" width="52" height="12" rx="3" fill="url(#ca-base)"/>
  <rect x="14" y="97" width="52" height="2" rx="1" fill="rgba(200,150,0,0.4)"/>
</svg>
