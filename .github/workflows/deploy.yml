name: Deploy to Production

on:
  push:
    branches: [v3.0]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          # Accept both raw PEM and base64-encoded key formats
          if echo "$SSH_PRIVATE_KEY" | grep -q "BEGIN"; then
            printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          else
            echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_deploy
          fi
          chmod 600 ~/.ssh/id_deploy
          # Validate key is usable
          ssh-keygen -y -f ~/.ssh/id_deploy > /dev/null || { echo "ERROR: SSH key is invalid or malformed"; exit 1; }

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -p 65002 -H 147.93.88.37 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync files to server
        run: |
          rsync -az --stats \
            -e "ssh -p 65002 -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no" \
            --exclude='node_modules/' \
            --exclude='logs/' \
            --exclude='contact_messages.json' \
            --exclude='.git/' \
            --exclude='squads/.seed-progress.json' \
            match_engine/webapp/ \
            u990866731@147.93.88.37:~/domains/golazox.com/nodejs/

      - name: Restart Node server
        continue-on-error: true
        run: |
          ssh -p 65002 -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no \
            u990866731@147.93.88.37 \
            "cd ~/domains/golazox.com/nodejs && \
             pkill -f 'server.js' 2>/dev/null || true; \
             pkill -9 -f 'lsnode' 2>/dev/null || true; \
             sleep 2; \
             nohup /opt/alt/alt-nodejs22/root/usr/bin/node server.js >> logs/app.log 2>&1 &"
